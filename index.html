<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mapa GeoJSON</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <style>
    html, body, #map { height: 100%; margin: 0; }
  </style>
</head>
<body>
<div id="map"></div>

<script>
  const map = L.map('map');

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  fetch('SenyalsTRAGSA6.geojson')
    .then(r => {
      if (!r.ok) throw new Error('No se pudo cargar el GeoJSON');
      return r.json();
    })
    .then(data => {
      const capa = L.geoJSON(data).addTo(map);
      map.fitBounds(capa.getBounds());
    })
    .catch(err => {
      console.error(err);
      alert('Error cargando el GeoJSON');
    });

</body>
</html>
